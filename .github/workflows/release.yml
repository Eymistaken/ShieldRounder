name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build and optionally publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read mod version
        id: version
        shell: bash
        run: |
          version="$(grep -E '^mod_version=' gradle.properties | cut -d= -f2- | tr -d '[:space:]')"
          minecraft_version="$(grep -E '^minecraft_version=' gradle.properties | cut -d= -f2- | tr -d '[:space:]')"
          loader_version="$(grep -E '^loader_version=' gradle.properties | cut -d= -f2- | tr -d '[:space:]')"
          archives_base_name="$(grep -E '^archives_base_name=' gradle.properties | cut -d= -f2- | tr -d '[:space:]')"
          
          if [[ -z "$version" ]]; then
            echo "mod_version was not found in gradle.properties" >&2
            exit 1
          fi
          if [[ -z "$minecraft_version" || -z "$loader_version" || -z "$archives_base_name" ]]; then
            echo "minecraft_version, loader_version, or archives_base_name was not found in gradle.properties" >&2
            exit 1
          fi

          tag="v${version}"
          artifact="${archives_base_name}-${version}.jar"
          
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=${minecraft_version}" >> "$GITHUB_OUTPUT"
          echo "loader_version=${loader_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

      - name: Check if release is needed
        id: release_check
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          should_release=false

          # PR olmayan push'larda veya manuel tetiklemelerde tag yoksa release başlatır
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]] || [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "Tag ${tag} bulunamadı, yeni release oluşturulacak."
              should_release=true
            else
              echo "Tag ${tag} zaten mevcut, release atlanıyor."
            fi
          fi

          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew build

      - name: Collect release files
        if: steps.release_check.outputs.should_release == 'true'
        shell: bash
        run: |
          mkdir -p release
          cp "build/libs/${{ steps.version.outputs.artifact }}" release/

      - name: Publish GitHub release
        if: steps.release_check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          MINECRAFT_VERSION: ${{ steps.version.outputs.minecraft_version }}
          LOADER_VERSION: ${{ steps.version.outputs.loader_version }}
        shell: bash
        run: |
          title="Eymistaken's Shield Rounder ${VERSION}"
          notes="Automated build for Minecraft ${MINECRAFT_VERSION} with Fabric Loader ${LOADER_VERSION}."

          # GitHub Actions botu için Git kimliği tanımlıyoruz
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}"

          gh release create "${TAG}" release/*.jar \
            --target "${GITHUB_SHA}" \
            --title "${title}" \
            --notes "${notes}"
